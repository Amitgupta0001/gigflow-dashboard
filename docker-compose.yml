version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/gigflow
      JWT_SECRET: your_super_secret_jwt_key_at_least_32_characters_long
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      ADMIN_SECRET: admin_secret_for_creating_admin_users
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
